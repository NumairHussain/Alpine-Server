services:
  github-runner:
    image: myoung34/github-runner
    restart: always
    environment:
      RUNNER_NAME: alpine-runner
      REPO_URL: https://github.com/NumairHussain/Alpine-Server
      ACCESS_TOKEN: ${GITHUB_PAT:-xxx}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./_work:/_work
      - ./runner-config:/runner