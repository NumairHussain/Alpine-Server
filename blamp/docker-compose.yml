services:
  minecraft:
    image: itzg/minecraft-server
    container_name: blamp-minecraft
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      TYPE: "VANILLA"
      VERSION: "LATEST"
      MEMORY: "4G"
      LEVEL: "Blamp"
      MOTD: "Blamp SMP"
      ENABLE_WHITELIST: "FALSE"
      ONLINE_MODE: "TRUE"
      DIFFICULTY: "hard"
    volumes:
      - ./data:/data
    restart: unless-stopped