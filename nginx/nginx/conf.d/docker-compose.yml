services:
    nginx:
        image: nginx:latest
        container_name: nginx
        networks:
        - media-net
        ports:
            - "80:80"
            - "443:443"
        restart: unless-stopped
        volumes:
        - ./nginx.conf:/etc/nginx/conf.d/default.conf
        - /etc/letsencrypt:/etc/letsencrypt:ro
        
networks:
    media-net:
      driver: bridge