# Redirect all HTTP to HTTPS for all your subdomains
server {
    listen 80;
    server_name nhjellyfin.duckdns.org nhjellyseerr.duckdns.org nhsonarr.duckdns.org nhradarr.duckdns.org nhqbittorrent.duckdns.org;

    location / {
        return 301 https://$host$request_uri;
    }
}

# Jellyseerr
server {
    listen 443 ssl;
    server_name nhjellyseerr.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/nhjellyfin.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nhjellyfin.duckdns.org/privkey.pem;

    location / {
        proxy_pass http://jellyseerr:5055;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Allow embedding in iframe for Jellyfin requests tab
        add_header X-Frame-Options "ALLOWALL" always;
        add_header Content-Security-Policy "frame-ancestors 'self' https://nhjellyfin.duckdns.org https://nhjellyseerr.duckdns.org;" always;
    }
}

# Jellyfin
server {
    listen 443 ssl;
    server_name nhjellyfin.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/nhjellyfin.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nhjellyfin.duckdns.org/privkey.pem;

    # Root Path
    location / {
        proxy_pass http://jellyfin:8096;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Sonarr
    location /sonarr/ {
        proxy_pass http://sonarr:8989/sonarr/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Radarr
    location /radarr/ {
        proxy_pass http://radarr:7878/radarr/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # qBittorrent
    location /qbittorrent/ {
        proxy_pass http://qbittorrent:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Prowlarr
    location /prowlarr/ {
        proxy_pass http://prowlarr:9696/prowlarr/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Lidarr
    location /lidarr/ {
        proxy_pass http://lidarr:8686/lidarr/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

