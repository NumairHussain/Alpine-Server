# Redirect all HTTP to HTTPS 
server {
    listen 80;

    server_name jellyfin.nhstudio.dev \
        jellyseerr.nhstudio.dev \
        sonarr.nhstudio.dev \
        radarr.nhstudio.dev \
        qbittorrent.nhstudio.dev \
        prowlarr.nhstudio.dev \
        lidarr.nhstudio.dev \
        pihole.nhstudio.dev;

    location / {
        return 301 https://$host$request_uri;
    }
}

# Jellyseerr
server {
    listen 443 ssl;
    server_name jellyseerr.nhstudio.dev;

    ssl_certificate /etc/letsencrypt/live/nhstudio.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nhstudio.dev/privkey.pem;

    location / {
        proxy_pass http://jellyseerr:5055;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Allow embedding in iframe for Jellyfin requests tab
        add_header X-Frame-Options "ALLOWALL" always;
        add_header Content-Security-Policy "frame-ancestors 'self' https://jellyfin.nhstudio.dev https://jellyseerr.nhstudio.dev;" always;
    }
}

# Jellyfin
server {
    listen 443 ssl;
    server_name jellyfin.nhstudio.dev;

    ssl_certificate /etc/letsencrypt/live/nhstudio.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nhstudio.dev/privkey.pem;

    location / {
        proxy_pass http://jellyfin:8096;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

