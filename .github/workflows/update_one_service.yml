name: Update One Service
run-name: ${{ github.actor }} Updated One Service - ${{ github.event.inputs.service_name }}
on:
    workflow_dispatch:
        inputs:
            service_name:
                description: Choose the service to update
                required: true
                type: choice
                options:
                    - Jellyfin
                    - Olympus
                    - Pi-Hole


jobs:
    update_one_service:
        runs-on: [
            self-hosted,
            linux,
            X64,
            Alpine
        ]
        steps:
        -   name: Checkout repository
            uses: actions/checkout@v4
        

        -   name: Update Jellyfin Services
            env:
                OPENVPN_PASSWORD: ${{ secrets.OPENVPN_PASSWORD }}
                OPENVPN_USERNAME: ${{ secrets.OPENVPN_USERNAME }}
                DUCK_DNS_TOKEN: ${{ secrets.DUCK_DNS_TOKEN }}
            if: ${{ github.event.inputs.service_name == 'Jellyfin' }}
            run: |
                echo "Updating Jellyfin service..."

                cd jellyfin
                if [ $? -ne 0 ]; then
                    echo "Error: Changing Directory to Jellyfin failed";
                    exit 1;
                fi

                docker compose pull
                if [ $? -ne 0 ]; then
                    echo "Error: Pulling latest Jellyfin stack image failed";
                    exit 1;
                fi

                docker compose up -d
                if [ $? -ne 0 ]; then
                    echo "Error: Starting updated Jellyfin service failed";
                    exit 1;
                fi

        -   name: Update Olympus Service
            if: ${{ github.event.inputs.service_name == 'Olympus' }}
            run: |
                echo "Updating Olympus service..."

                cd olympus
                if [ $? -ne 0 ]; then
                    echo "Error: Changing Directory to Olympus failed";
                    exit 1;
                fi

                docker compose pull
                if [ $? -ne 0 ]; then
                    echo "Error: Pulling latest minecraft-bedrock image failed";
                    exit 1;
                fi

                docker compose up -d
                if [ $? -ne 0 ]; then
                    echo "Error: Starting updated service olympus failed";
                    exit 1;
                fi

        -   name: Update Pi-Hole Service
            if: ${{ github.event.inputs.service_name == 'Pi-Hole' }}
            env:
                PIHOLE_PASSWORD: ${{ secrets.PIHOLE_PASSWORD }}
            run: |
                echo "Updating Pi-Hole service..."

                cd pi-hole
                if [ $? -ne 0 ]; then
                    echo "Error: Changing Directory to Pi-Hole failed";
                    exit 1;
                fi

                docker compose pull
                if [ $? -ne 0 ]; then
                    echo "Error: Pulling latest Pi-Hole image failed";
                    exit 1;
                fi

                docker compose up -d
                if [ $? -ne 0 ]; then
                    echo "Error: Starting updated Pi-Hole service failed";
                    exit 1;
                fi
